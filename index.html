<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Story 💗</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e8,#ffc2d1,#ffe5ec);
    overflow:hidden;
}

.container{
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(20px);
    padding:50px 35px;
    border-radius:30px;
    width:380px;
    text-align:center;
    box-shadow:0 10px 40px rgba(255,182,193,0.4);
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    color:#ff4d88;
    margin-bottom:25px;
}

.buttons{
    display:grid;
    gap:15px;
}

button{
    padding:12px;
    border:none;
    border-radius:25px;
    font-size:15px;
    cursor:pointer;
    background:#ff4d88;
    color:white;
    transition:0.3s;
    box-shadow:0 0 15px #ff4d88;
}

button:hover{
    transform:scale(1.05);
}

.story{
    margin-top:25px;
    font-size:16px;
    color:#444;
    min-height:60px;
    transition:0.5s;
}

/* floating hearts */
.heart{
    position:fixed;
    bottom:-10px;
    font-size:18px;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0) rotate(0deg);}
    100%{transform:translateY(-100vh) rotate(360deg);}
}
</style>
</head>

<body>

<audio autoplay loop>
    <source src="sorry.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>How Did We Meet? 💕</h1>

    <div class="buttons">
        <button onclick="showStory('college')">College 🎓</button>
        <button onclick="showStory('insta')">Instagram 📱</button>
        <button onclick="showStory('friend')">Mutual Friend 🤝</button>
        <button onclick="showStory('destiny')">Destiny ✨</button>
    </div>

    <div class="story" id="storyText"></div>
</div>

<script>

function showStory(type){

    let text = "";

    if(type === "college"){
        text = "Maybe it started in a classroom... but little did I know, you would become my favorite lesson in life 💗";
    }
    else if(type === "insta"){
        text = "One random follow... one random reply... and suddenly you became my favorite notification 🌸";
    }
    else if(type === "friend"){
        text = "Thanks to that one friend... who unknowingly introduced me to the most beautiful part of my life 💕";
    }
    else if(type === "destiny"){
        text = "Maybe we didn’t meet by chance… maybe it was written somewhere that our paths would cross ✨💖";
    }

    document.getElementById("storyText").innerHTML = text;
}

// Floating hearts
setInterval(function(){
    var heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(heart);

    setTimeout(function(){
        heart.remove();
    },6000);

},700);

// autoplay fix
window.addEventListener("click",function(){
    document.querySelector("audio").play();
},{once:true});

</script>

</body>
</html>
